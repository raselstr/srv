services:

  npm:
    image: jc21/nginx-proxy-manager:latest

    container_name: npm

    restart: always

    ports:
      - "80:80"
      - "81:81"
      - "443:443"

    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt

    networks:
      - production_network

networks:
  production_network:
    external: true